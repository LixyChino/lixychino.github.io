name: Switch GitHub Pages to Redirect

on:
  schedule:
    # 7/1 00:00 JST（UTCでは6/30 15:00）
    - cron: '0 15 30 6 *'

  # テスト用に手動実行もできる
  workflow_dispatch:

permissions:
  contents: write

jobs:
  switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace with redirect page
        run: |
          cp redirect/index.html index.html

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html
          git commit -m "Switch GitHub Pages to redirect" || echo "No changes"

          git push
