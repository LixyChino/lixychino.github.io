<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>

<link rel="canonical" href="https://github.com/LixyChino/Anti-Rounded-Corners-YouTubeUI">
<meta http-equiv="refresh" content="0;url=https://github.com/LixyChino/Anti-Rounded-Corners-YouTubeUI">

<script>
location.replace(
  "https://github.com/LixyChino/Anti-Rounded-Corners-YouTubeUI" +
  location.pathname +
  location.search +
  location.hash

</script>

</head>
<body>
